<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Madrid Adventures</title>
<meta name="description" content="A bookshelf of comic adventures starring Maria, Pepe & Luna — three siblings, many worlds." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root {
    --paper: #fbf3e4;
    --paper-2: #f6e7cf;
    --ink: #3a2c20;
    --ink-soft: #6b5947;
    --terracotta: #d2693f;
    --ochre: #e0a43b;
    --peach: #f4b58a;
    --teal: #3f8c84;
    --plum: #7d5a8c;
    --shelf: #b07a4a;
    --shelf-dark: #8a5c34;
    --card-radius: 18px;
    --shadow: 0 10px 24px rgba(91, 58, 30, 0.18), 0 2px 6px rgba(91, 58, 30, 0.12);
  }

  * { box-sizing: border-box; }

  html, body { margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', system-ui, sans-serif;
    color: var(--ink);
    background-color: var(--paper);
    /* gentle paper texture: warm radial wash + faint speckle */
    background-image:
      radial-gradient(circle at 18% 12%, rgba(224, 164, 59, 0.16), transparent 42%),
      radial-gradient(circle at 84% 8%, rgba(210, 105, 63, 0.14), transparent 40%),
      radial-gradient(circle at 50% 120%, rgba(63, 140, 132, 0.12), transparent 55%);
    min-height: 100vh;
    line-height: 1.5;
  }

  /* faint dotted texture overlay */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    opacity: 0.5;
    background-image: radial-gradient(rgba(138, 92, 52, 0.07) 1px, transparent 1.4px);
    background-size: 22px 22px;
  }

  .wrap {
    position: relative;
    z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 28px 22px 64px;
  }

  /* ---------- header ---------- */
  header.site {
    text-align: center;
    padding: 18px 12px 8px;
  }

  /* real character avatars — Maria → Pepe → Luna */
  .mascot {
    display: flex;
    justify-content: center;
    align-items: flex-end;
    gap: 0;
    margin: 0 auto 10px;
  }
  .mascot .avatar {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    object-fit: cover;
    object-position: center;                  /* pre-centered square fills the circle */
    background: #fbf3e4;
    border: 4px solid #fffdf8;               /* soft white ring */
    box-shadow: 0 6px 14px rgba(91, 58, 30, 0.22);
    margin-left: -14px;                       /* gentle overlap */
    transition: transform 0.18s ease;
  }
  .mascot .avatar:first-child { margin-left: 0; }
  .mascot .avatar:hover { transform: translateY(-4px) scale(1.05); z-index: 2; }
  /* layer left-to-right so the overlap reads cleanly */
  .mascot .avatar:nth-child(1) { z-index: 3; }
  .mascot .avatar:nth-child(2) { z-index: 2; }
  .mascot .avatar:nth-child(3) { z-index: 1; }

  @media (max-width: 520px) {
    .mascot .avatar { width: 56px; height: 56px; border-width: 3px; margin-left: -11px; }
  }
  @media print {
    .mascot .avatar { box-shadow: none; }
  }

  h1.site-title {
    font-family: 'Fredoka', cursive;
    font-weight: 700;
    font-size: clamp(2.3rem, 6vw, 3.6rem);
    color: var(--terracotta);
    margin: 4px 0 2px;
    letter-spacing: 0.5px;
    text-shadow: 2px 2px 0 #fff, 4px 4px 0 rgba(224, 164, 59, 0.35);
  }

  p.tagline {
    font-family: 'Fredoka', cursive;
    font-weight: 400;
    font-size: clamp(1rem, 2.6vw, 1.3rem);
    color: var(--ink-soft);
    margin: 0 auto;
    max-width: 30ch;
  }

  .rule {
    width: 120px;
    height: 6px;
    margin: 18px auto 4px;
    border-radius: 6px;
    background: repeating-linear-gradient(90deg, var(--ochre) 0 14px, var(--terracotta) 14px 28px);
    opacity: 0.85;
  }

  /* ---------- shelf grid ---------- */
  .shelf {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
    gap: 30px 26px;
    margin-top: 34px;
  }

  .card {
    position: relative;
    display: flex;
    flex-direction: column;
    text-decoration: none;
    color: inherit;
    background: #fffdf8;
    border-radius: var(--card-radius);
    padding: 12px 12px 16px;
    box-shadow: var(--shadow);
    border: 1px solid rgba(138, 92, 52, 0.14);
    transition: transform 0.18s ease, box-shadow 0.18s ease;
  }
  .card:nth-child(odd) { transform: rotate(-0.7deg); }
  .card:nth-child(even) { transform: rotate(0.7deg); }

  a.card:hover, a.card:focus-visible {
    transform: translateY(-6px) rotate(0deg) scale(1.02);
    box-shadow: 0 18px 34px rgba(91, 58, 30, 0.24), 0 4px 10px rgba(91, 58, 30, 0.14);
    outline: none;
  }

  /* coming-soon: visible but disabled */
  .card.disabled {
    cursor: not-allowed;
    filter: saturate(0.7);
    opacity: 0.82;
  }
  .card.disabled:hover { transform: rotate(-0.7deg); }

  .cover {
    position: relative;
    aspect-ratio: 3 / 4;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: inset 0 0 0 1px rgba(138, 92, 52, 0.12);
  }
  .cover img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* placeholder tile: colored card with the title */
  .cover.placeholder {
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 16px;
    color: #fff;
  }
  .cover.placeholder .ph-inner {
    display: flex;
    flex-direction: column;
    gap: 8px;
    align-items: center;
  }
  .cover.placeholder .ph-title {
    font-family: 'Fredoka', cursive;
    font-weight: 600;
    font-size: 1.35rem;
    line-height: 1.15;
    text-shadow: 0 2px 4px rgba(0,0,0,0.22);
  }
  .cover.placeholder .ph-mark {
    font-size: 2.4rem;
    opacity: 0.9;
  }
  .cover.placeholder .ph-note {
    font-family: 'Nunito', sans-serif;
    font-size: 0.72rem;
    letter-spacing: 0.6px;
    text-transform: uppercase;
    opacity: 0.85;
  }

  .card-body { padding: 12px 6px 2px; }

  .title {
    font-family: 'Fredoka', cursive;
    font-weight: 600;
    font-size: 1.18rem;
    color: var(--ink);
    margin: 0 0 2px;
  }
  .subtitle {
    font-size: 0.86rem;
    color: var(--ink-soft);
    margin: 0 0 10px;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 0.72rem;
    font-weight: 800;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 999px;
    color: #fff;
  }
  .badge::before {
    content: "";
    width: 7px; height: 7px;
    border-radius: 50%;
    background: rgba(255,255,255,0.9);
  }
  .badge.published   { background: var(--teal); }
  .badge.in-progress { background: var(--ochre); color: #4a3414; }
  .badge.in-progress::before { background: rgba(74,52,20,0.6); }
  .badge.coming-soon { background: var(--plum); }

  /* little corner ribbon for disabled cards */
  .lock {
    position: absolute;
    top: 18px; right: 18px;
    background: rgba(255,255,255,0.92);
    color: var(--plum);
    font-size: 0.68rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 4px 9px;
    border-radius: 999px;
    box-shadow: 0 2px 6px rgba(91,58,30,0.2);
  }

  /* ---------- states ---------- */
  .status-msg {
    text-align: center;
    font-family: 'Fredoka', cursive;
    color: var(--ink-soft);
    padding: 50px 20px;
    font-size: 1.15rem;
  }

  footer.site {
    text-align: center;
    margin-top: 54px;
    color: var(--ink-soft);
    font-size: 0.85rem;
  }
  footer.site .siblings { font-family: 'Fredoka', cursive; color: var(--terracotta); }

  /* ---------- print ---------- */
  @media print {
    body { background: #fff; }
    body::before { display: none; }
    .mascot { filter: none; }
    .shelf { gap: 18px; grid-template-columns: repeat(3, 1fr); }
    .card, a.card { transform: none !important; box-shadow: none; border: 1px solid #ccc; break-inside: avoid; }
    .lock { box-shadow: none; }
    h1.site-title { text-shadow: none; }
    footer.site { margin-top: 24px; }
  }

  @media (max-width: 520px) {
    .shelf { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 20px 16px; }
    .title { font-size: 1.05rem; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <header class="site">
      <!-- the three siblings — real character avatars (Maria → Pepe → Luna) -->
      <div class="mascot" role="img" aria-label="Maria, Pepe and Luna">
        <img class="avatar" src="dashboard/assets/maria_avatar.png" alt="Maria" width="72" height="72" />
        <img class="avatar" src="dashboard/assets/pepe_avatar.png" alt="Pepe" width="72" height="72" />
        <img class="avatar" src="dashboard/assets/luna_avatar.png" alt="Luna" width="72" height="72" />
      </div>
      <h1 class="site-title" id="siteTitle">The Madrid Adventures</h1>
      <p class="tagline" id="siteTagline">Loading the shelf…</p>
      <div class="rule"></div>
    </header>

    <main>
      <div class="shelf" id="shelf" aria-live="polite"></div>
      <div class="status-msg" id="statusMsg">Opening the bookshelf…</div>
    </main>

    <footer class="site">
      <span class="siblings">Maria · Pepe · Luna</span> — three siblings, many worlds.
    </footer>
  </div>

<script>
  // Palette used to tint placeholder covers (one per card, deterministic by id).
  const PH_COLORS = [
    ['#d2693f', '#e0a43b'], // terracotta → ochre  (Rome-warm)
    ['#7d5a8c', '#4f7bd0'], // plum → blue         (Hogwarts-magic)
    ['#c0532e', '#8a4b9c'], // rust → violet       (Mars-dusk)
    ['#3f8c84', '#6cae9e'], // teal blend
    ['#e08a3b', '#d2693f']  // amber blend
  ];

  function hashIndex(str, mod) {
    let h = 0;
    for (let i = 0; i < str.length; i++) h = (h * 31 + str.charCodeAt(i)) >>> 0;
    return h % mod;
  }

  // A registry cover is "real" only if it isn't the placeholder token / empty.
  function hasRealCover(cover) {
    if (!cover || typeof cover !== 'string') return false;
    const c = cover.trim();
    if (!c) return false;
    if (c.startsWith('<') && c.endsWith('>')) return false; // e.g. "<cover-image-url>"
    return true;
  }

  // Story paths in the registry are written absolute ("/stories/rome/"). On GitHub
  // *project* Pages the site is served from /<repo>/, so make them relative to this
  // page instead — works at the domain root and under a sub-path alike.
  function toRelative(path) {
    if (!path) return '#';
    return path.replace(/^\/+/, '');
  }

  const STATUS_LABEL = {
    'published': 'Published',
    'in-progress': 'In progress',
    'coming-soon': 'Coming soon'
  };

  function el(tag, attrs = {}, ...kids) {
    const n = document.createElement(tag);
    for (const [k, v] of Object.entries(attrs)) {
      if (k === 'class') n.className = v;
      else if (k === 'html') n.innerHTML = v;
      else n.setAttribute(k, v);
    }
    for (const kid of kids) if (kid != null) n.append(kid);
    return n;
  }

  function buildCover(story) {
    if (hasRealCover(story.cover)) {
      const wrap = el('div', { class: 'cover' });
      const img = el('img', {
        src: story.cover,
        alt: 'Cover of ' + story.title,
        loading: 'lazy'
      });
      // graceful fallback if the URL ever breaks
      img.onerror = () => { wrap.replaceWith(buildPlaceholder(story)); };
      wrap.append(img);
      return wrap;
    }
    return buildPlaceholder(story);
  }

  function buildPlaceholder(story) {
    const [a, b] = PH_COLORS[hashIndex(story.id || story.title || 'x', PH_COLORS.length)];
    const wrap = el('div', { class: 'cover placeholder' });
    wrap.style.background = `linear-gradient(150deg, ${a}, ${b})`;
    wrap.append(
      el('div', { class: 'ph-inner' },
        el('div', { class: 'ph-mark' }, '✦'),
        el('div', { class: 'ph-title' }, story.title || 'Untitled'),
        el('div', { class: 'ph-note' }, 'cover coming soon')
      )
    );
    return wrap;
  }

  function buildCard(story) {
    const isComingSoon = story.status === 'coming-soon';
    const tag = isComingSoon ? 'div' : 'a';
    const attrs = { class: 'card' + (isComingSoon ? ' disabled' : '') };
    if (!isComingSoon) {
      attrs.href = toRelative(story.path);
    } else {
      attrs['aria-disabled'] = 'true';
      attrs.title = story.title + ' — coming soon';
    }

    const card = el(tag, attrs);
    card.append(buildCover(story));

    const body = el('div', { class: 'card-body' });
    body.append(el('h2', { class: 'title' }, story.title || 'Untitled'));
    if (story.subtitle) body.append(el('p', { class: 'subtitle' }, story.subtitle));

    const statusClass = (story.status || 'coming-soon');
    body.append(el('span',
      { class: 'badge ' + statusClass },
      STATUS_LABEL[statusClass] || statusClass));
    card.append(body);

    if (isComingSoon) card.append(el('span', { class: 'lock' }, '🔒 Soon'));
    return card;
  }

  function sortStories(stories) {
    return [...stories].sort((x, y) => {
      const ox = x.order ?? 9999, oy = y.order ?? 9999;
      if (ox !== oy) return ox - oy;
      return String(x.added || '').localeCompare(String(y.added || ''));
    });
  }

  async function load() {
    const shelf = document.getElementById('shelf');
    const statusMsg = document.getElementById('statusMsg');
    try {
      // Fetch the registry relative to this page (don't hardcode the book list).
      const res = await fetch('stories.json', { cache: 'no-cache' });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();

      const site = data.site || {};
      if (site.title) {
        document.getElementById('siteTitle').textContent = site.title;
        document.title = site.title;
      }
      document.getElementById('siteTagline').textContent =
        site.tagline || 'Three siblings, many worlds.';

      const stories = Array.isArray(data.stories) ? data.stories : [];
      if (!stories.length) {
        statusMsg.textContent = 'No stories on the shelf yet — check back soon!';
        return;
      }

      const frag = document.createDocumentFragment();
      for (const story of sortStories(stories)) frag.append(buildCard(story));
      shelf.append(frag);
      statusMsg.remove();
    } catch (err) {
      console.error('Could not load stories.json:', err);
      statusMsg.innerHTML =
        'Could not open the bookshelf.<br><small style="font-weight:600">' +
        'Tip: this page reads <code>stories.json</code> over HTTP — ' +
        'run a local server (<code>python&nbsp;-m&nbsp;http.server</code>) rather than ' +
        'opening the file directly.</small>';
    }
  }

  load();
</script>
</body>
</html>
